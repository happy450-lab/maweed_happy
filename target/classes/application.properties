spring.application.name=maweed
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/maweed_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:qwert12345}

spring.jpa.hibernate.ddl-auto=update
# ✅ أوقف show-sql في البرودكشن — بيبطئ السيستم ومش محتاجه
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ✅ تحسين الأداء — batch insert/update
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Show detailed error messages in JSON responses
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Setting Dynamic Port for Railway
server.port=${PORT:8080}

# ============================================================
# 🔐 الأمان — غيّر القيم دي في متغيرات البيئة على Railway
# ============================================================
# كلمة سر الأدمين: غيّرها في Railway -> Variables -> ADMIN_SECRET_TOKEN
admin.secret.token=${ADMIN_SECRET_TOKEN:maweed_admin_2026}

# مفتاح تشفير JWT (32 حرف على الأقل)
jwt.secret=${JWT_SECRET:maweed-super-secret-key-change-in-prod-32ch}

# مدة صلاحية التوكن بالميللي ثانية (24 ساعة)
jwt.expiration.ms=86400000


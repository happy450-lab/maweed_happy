<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول - مواعيد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; direction: rtl; }
        .login-card { max-width: 450px; margin-top: 100px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="card login-card p-4">
        <h2 class="text-center mb-4">تسجيل الدخول</h2>

        <div th:if="${param.error}" class="alert alert-danger text-center">
            خطأ في الرقم القومي أو كلمة المرور
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">الرقم القومي (اسم المستخدم)</label>
                <input type="text" name="username" class="form-control" placeholder="14 رقم" required>
            </div>

            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">دخول</button>

            <div class="text-center">
                <span>ليس لديك حساب؟ </span>
                <a th:href="@{/register}" class="text-decoration-none">إنشاء حساب جديد</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>

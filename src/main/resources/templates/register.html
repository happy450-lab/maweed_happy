<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>تسجيل دخول - مواعيد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" style="direction: rtl; text-align: right;">
<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h3 class="text-center mb-4">انشاء حساب</h3>

                <div class="mb-3">
                    <label>الاسم بالكامل</label>
                    <input type="text" name="fullName" class="form-control" placeholder="اكتب اسمك">
                </div>
                <div class="mb-3">
                    <label>الرقم القومي</label>
                    <input type="text" name="nationalId" class="form-control" placeholder="14 رقم">
                </div>
                <div class="mb-3">
                    <label>رقم الموبايل</label>
                    <input type="text" name="phoneNumber" class="form-control" placeholder="01xxxxxxxxx">
                </div>
                <div class="mb-3">
                    <label>كلمة المرور</label>
                    <input type="password" name="password" class="form-control">
                </div>

                <div class="mb-3">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" id="confirm_password" class="form-control" required oninput="check()">
                    <small id="message"></small>
                </div>
                <button type="submit" class="btn btn-success w-100">حساب جديد</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

spring.application.name=maweed
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/maweed_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:qwert12345}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show detailed error messages in JSON responses
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Setting Dynamic Port for Railway
server.port=${PORT:8080}

# Increase max file size for uploads (especially for mobile photos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
